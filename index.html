<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailRefiner - Professional Email Rewriter & Drafting Tool</title>
    <meta name="description" content="Transform your rough drafts into professional, polished emails instantly with EmailRefiner. Free, fast, and easy email editing tool for everyone.">
    <meta name="keywords" content="Email Refiner, Professional Email Writer, Email Drafting Tool, Rewrite Emails, Business Email Helper">
    <link rel="canonical" href="https://emailrefiner.site/" />
    
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-PKTNJGDV');</script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .emerald-btn { background-color: #059669; color: white; }
        .emerald-btn:hover { background-color: #047857; }
        .active-btn { background-color: #065f46 !important; color: white !important; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 1; bottom: 30px; font-size: 14px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="py-10 px-4">
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PKTNJGDV" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    
    <div id="toast">Copied to clipboard!</div>

    <main class="max-w-2xl mx-auto premium-card p-8 rounded-[2rem]">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-emerald-950 tracking-tighter">EmailRefiner</h1>
            <p class="text-emerald-700 mt-2 font-medium">Select a tone and generate unlimited variations.</p>
        </header>

        <section class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="setTone(this, 'Professional')" class="tone-btn active-btn p-3 rounded-xl border border-emerald-200 font-semibold transition-all">Professional</button>
            <button onclick="setTone(this, 'Friendly')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Friendly</button>
            <button onclick="setTone(this, 'Formal')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Formal</button>
            <button onclick="setTone(this, 'Concise')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Concise</button>
        </section>

        <textarea id="input" class="w-full p-5 border-2 border-emerald-100 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-emerald-500 min-h-[150px]" placeholder="Type your rough draft here..."></textarea>
        
        <button onclick="refine()" class="w-full emerald-btn py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 transition-all">Refine & Get Variation</button>

        <section id="outputArea" class="hidden mt-8 border-t pt-6">
            <div id="output" class="w-full p-6 bg-slate-50 border-2 border-emerald-100 rounded-2xl text-slate-700 leading-relaxed whitespace-pre-wrap"></div>
            <button onclick="copy()" class="mt-4 w-full py-3 bg-emerald-50 text-emerald-700 font-bold rounded-xl hover:bg-emerald-100 transition-all">Copy to Clipboard</button>
        </section>
    </main>

    <script>
        let currentTone = 'Professional';
        function setTone(btn, tone) {
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            currentTone = tone;
        }

        function refine() {
            const input = document.getElementById('input').value.trim();
            if(!input) return;

            const templates = {
                "Professional": [
                    `Dear Recipient,\n\nI am writing to formally address the following matter:\n\n${input}\n\nI look forward to your professional feedback.\n\nBest regards,\nAdil Mumtaz`,
                    `Dear Team,\n\nI would like to bring the following to your attention:\n\n${input}\n\nThank you for your time and consideration.\n\nSincerely,\nAdil Mumtaz`,
                    `To whom it may concern,\n\nRegarding the matter at hand:\n\n${input}\n\nI appreciate your assistance.\n\nRespectfully,\nAdil Mumtaz`
                ],
                "Friendly": [
                    `Hi there,\n\nHope you're having a great day! I just wanted to share this:\n\n${input}\n\nLet me know what you think.\n\nBest,\nAdil Mumtaz`,
                    `Hi,\n\nI wanted to quickly touch base with you regarding this:\n\n${input}\n\nThanks for your help!\n\nCheers,\nAdil Mumtaz`,
                    `Hello,\n\nJust dropping a quick note to let you know about this:\n\n${input}\n\nLooking forward to hearing from you!\n\nBest,\nAdil Mumtaz`
                ],
                "Formal": [
                    `Dear Sir/Madam,\n\nI am writing to formally bring the following to your attention:\n\n${input}\n\nI appreciate your professional attention to this matter.\n\nRespectfully,\nAdil Mumtaz`,
                    `To the Management,\n\nPlease consider the following information regarding the current project:\n\n${input}\n\nI await your guidance.\n\nSincerely,\nAdil Mumtaz`,
                    `Formal Notification:\n\nThis is to inform you regarding the following:\n\n${input}\n\nI appreciate your cooperation.\n\nBest regards,\nAdil Mumtaz`
                ],
                "Concise": [
                    `Hello,\n\nRegarding the matter below:\n\n${input}\n\nBest regards,\nAdil Mumtaz`,
                    `Hi,\n\nJust a quick update for you:\n\n${input}\n\nThanks,\nAdil Mumtaz`,
                    `Hello,\n\nPlease see the following details:\n\n${input}\n\nBest,\nAdil Mumtaz`
                ]
            };

            const options = templates[currentTone];
            const randomIndex = Math.floor(Math.random() * options.length);
            document.getElementById('output').innerText = options[randomIndex];
            document.getElementById('outputArea').classList.remove('hidden');
        }

        function copy() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
