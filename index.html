<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailRefiner - All in One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; }
        .active-tab { background-color: #059669 !important; color: white !important; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-2xl mx-auto premium-card p-8 rounded-[2rem] shadow-xl">
        <!-- Navigation -->
        <nav class="flex justify-center space-x-4 mb-8 flex-wrap">
            <button onclick="showSection('home')" class="px-4 py-2 rounded-lg font-bold text-emerald-700">Home</button>
            <button onclick="showSection('about')" class="px-4 py-2 rounded-lg font-bold text-emerald-700">About</button>
            <button onclick="showSection('terms')" class="px-4 py-2 rounded-lg font-bold text-emerald-700">Terms</button>
            <button onclick="showSection('contact')" class="px-4 py-2 rounded-lg font-bold text-emerald-700">Contact</button>
        </nav>

        <!-- Home Section (Tool) -->
        <div id="home" class="section">
            <h1 class="text-3xl font-extrabold text-center text-emerald-950 mb-6">EmailRefiner</h1>
            <textarea id="input" class="w-full p-4 border rounded-xl mb-4" placeholder="Type your draft here..."></textarea>
            <button onclick="refine()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Refine Email</button>
            <div id="outputArea" class="hidden mt-6 p-4 bg-slate-50 border rounded-xl" id="output"></div>
        </div>

        <!-- Other Sections -->
        <div id="about" class="section hidden-section">
            <h2 class="text-2xl font-bold mb-4">About Us</h2>
            <p>EmailRefiner آپ کے ڈرافٹس کو پروفیشنل ای میلز میں تبدیل کرنے کا ایک بہترین ٹول ہے۔</p>
        </div>

        <div id="terms" class="section hidden-section">
            <h2 class="text-2xl font-bold mb-4">Terms & Conditions</h2>
            <p>ہماری سروس استعمال کرنے کے لیے آپ کو ہماری پالیسیوں کا احترام کرنا ہوگا۔</p>
        </div>

        <div id="contact" class="section hidden-section">
            <h2 class="text-2xl font-bold mb-4">Contact Us</h2>
            <p>رابطہ کریں: <strong>Qaraar1988@gmail.com</strong></p>
        </div>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
        }

        function refine() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('outputArea');
            output.innerText = "Refined: " + input.toUpperCase(); // یہاں آپ اپنا اصلی لاجک لگا سکتے ہیں
            output.classList.remove('hidden');
        }
    </script>
</body>
</html>
