<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailRefiner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .emerald-btn { background-color: #059669; color: white; }
        .emerald-btn:hover { background-color: #047857; }
        .active-btn { background-color: #065f46 !important; color: white !important; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 1; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 14px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="py-10 px-4">

    <!-- Navigation -->
    <nav class="max-w-2xl mx-auto mb-10 flex justify-center gap-4 text-emerald-800 font-bold flex-wrap">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div id="toast">Copied to clipboard!</div>

    <div class="max-w-2xl mx-auto premium-card p-8 rounded-[2rem]">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-emerald-950 tracking-tighter">EmailRefiner</h1>
            <p class="text-emerald-700 mt-2 font-medium">Transform your drafts into professional emails instantly.</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="setTone(this, 'Professional')" class="tone-btn active-btn p-3 rounded-xl border border-emerald-200 font-semibold transition-all">Professional</button>
            <button onclick="setTone(this, 'Friendly')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Friendly</button>
            <button onclick="setTone(this, 'Formal')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Formal</button>
            <button onclick="setTone(this, 'Concise')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Concise</button>
        </div>

        <textarea id="input" class="w-full p-5 border-2 border-emerald-100 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-emerald-500 min-h-[150px]" placeholder="Type your draft here..."></textarea>
        
        <button onclick="refine()" class="w-full emerald-btn py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 transition-all">Refine My Email</button>

        <div id="outputArea" class="hidden mt-8 border-t pt-6">
            <div id="output" class="w-full p-6 bg-slate-50 border-2 border-emerald-100 rounded-2xl text-slate-700 leading-relaxed whitespace-pre-wrap"></div>
            <button onclick="copy()" class="mt-4 w-full py-3 bg-emerald-50 text-emerald-700 font-bold rounded-xl hover:bg-emerald-100 transition-all">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        let currentTone = 'Professional';
        function setTone(btn, tone) {
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            currentTone = tone;
        }

        function refine() {
            const input = document.getElementById('input').value;
            if(!input) return;

            const responses = {
                "Professional": "Dear Team,\n\nI am writing to formally request a leave of absence due to unforeseen personal obligations. I have taken the necessary steps to ensure that all my ongoing projects and responsibilities are well-managed during my absence. I would appreciate your understanding and professional consideration regarding this request. I look forward to your positive response.\n\nBest Regards,\n[Your Name]",
                "Friendly": "Hi everyone!\n\nI hope you're all doing well. I am reaching out to let you know that I need to take a few days off for some personal matters. I’ve made sure that all my tasks are up to date so that things keep running smoothly while I'm away. Thanks so much for your support and understanding!\n\nBest wishes,\n[Your Name]",
                "Formal": "To the Management,\n\nThis is to formally notify you of my request for a leave of absence, effective immediately, due to unforeseen personal obligations. I assure you that all ongoing projects have been transitioned and are being well-managed to prevent any disruption. I appreciate your professional consideration of this request and await your approval.\n\nRespectfully,\n[Your Name]",
                "Concise": "Dear Team,\n\nI am requesting a leave of absence for a few days due to personal matters. I have ensured that my current tasks are covered and in good hands. Thank you for your cooperation and understanding.\n\nRegards,\n[Your Name]"
            };

            document.getElementById('output').innerText = responses[currentTone];
            document.getElementById('outputArea').classList.remove('hidden');
        }

        function copy() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
